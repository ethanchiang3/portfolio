<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品集 · Portfolio · PS Vita Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="vita-livearea">
    <div class="vita-name" aria-hidden="true">Ethan Chiang</div>
    <div class="vita-contact" aria-hidden="true">Contact</div>
    <!-- Bubble grid -->
    <main class="vita-bubble-area" id="bubbleArea" role="list">
      <!-- Bubbles injected by JS -->
    </main>

    <!-- Live Area / Project modal (opens when bubble is tapped) -->
    <div class="modal-overlay" id="projectModal" aria-hidden="true">
      <div class="modal vita-modal" role="dialog" aria-labelledby="modalTitle">
        <button class="modal-close peel-close" id="modalClose" aria-label="關閉">×</button>
        <div class="modal-content">
          <h2 id="modalTitle">作品標題</h2>
          <div class="modal-meta">
            <span id="modalTags"></span>
            <a id="modalLink" href="#" target="_blank" rel="noopener" class="modal-link">前往專案 →</a>
          </div>
          <div id="modalDescription" class="modal-description"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
